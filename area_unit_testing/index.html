<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Area Unit Testing</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect x='10' y='50' width='15' height='40' rx='2' fill='%236366f1'/%3E%3Crect x='35' y='30' width='15' height='60' rx='2' fill='%23818cf8'/%3E%3Crect x='60' y='10' width='15' height='80' rx='2' fill='%23c084fc'/%3E%3Cpath d='M75 10 Q90 10 90 25 Q90 40 75 40 Q60 40 60 25 Q60 10 75 10 Z' fill='%2310b981'/%3E%3C/svg%3E">

    <!-- Shared Styles -->
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../components/login_component.css">

    <style>
        .page-container {
            width: 100%;
            max-width: 95%;
            margin: 2rem auto;
            padding: 0 1rem;
            box-sizing: border-box;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 1.5rem;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--primary-color);
        }

        .header-section {
            margin-bottom: 2rem;
        }

        .header-section h1 {
            display: inline-block;
            font-size: 2rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .content-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        /* API Selection Styles */
        .api-selection-container {
            margin-bottom: 2rem;
        }

        .multi-select-wrapper {
            position: relative;
            width: 100%;
        }

        .select-trigger {
            padding: 0.75rem 1rem;
            background: var(--input-bg, #1e1e2e);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: border-color 0.2s;
        }

        .select-trigger:hover {
            border-color: var(--primary-color);
        }

        .select-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            margin-top: 0.5rem;
            max-height: 250px;
            overflow-y: auto;
            z-index: 100;
            display: none;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .select-dropdown.show {
            display: block;
        }

        .dropdown-item {
            padding: 0.75rem 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            border-bottom: 1px solid var(--border-color);
            transition: background 0.2s;
        }

        .dropdown-item:last-child {
            border-bottom: none;
        }

        .dropdown-item:hover {
            background: rgba(99, 102, 241, 0.1);
        }

        .dropdown-item input[type="checkbox"] {
            cursor: pointer;
            width: 16px;
            height: 16px;
        }

        .hidden {
            display: none;
        }

        #api-test-section {
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px dashed var(--border-color);
        }
    </style>
</head>

<body>
    <div class="page-container">
        <a href="../data_testing.html" class="back-link">← Back to Selection</a>

        <header class="header-section">
            <h1>Area Unit Testing</h1>
            <p style="color: var(--text-secondary);">Select APIs and environment to run unit tests.</p>
        </header>

        <div class="content-card">

            <!-- 1. API Selection (Always Visible) -->
            <div class="api-selection-container">
                <label
                    style="display: block; margin-bottom: 0.5rem; color: var(--text-secondary); font-size: 0.9rem;">Select
                    APIs to Test</label>
                <div class="multi-select-wrapper" style="margin-bottom: 1rem;">
                    <label
                        style="display: block; margin-bottom: 0.5rem; color: var(--text-secondary); font-size: 0.9rem;">Select
                        Method</label>
                    <select id="method-select"
                        style="width: 100%; padding: 0.75rem 1rem; background: var(--input-bg, #1e1e2e); border: 1px solid var(--border-color); border-radius: 8px; color: var(--text-primary); cursor: pointer;">
                        <option value="GET">GET</option>
                        <option value="POST">POST</option>
                        <option value="PUT">PUT</option>
                    </select>
                </div>

                <div class="multi-select-wrapper">
                    <div class="select-trigger" id="api-select-trigger">
                        <span id="api-select-text">Select APIs...</span>
                        <span>▼</span>
                    </div>
                    <div class="select-dropdown" id="api-select-dropdown">
                        <!-- Options injected by JS -->
                        <div style="padding: 1rem; text-align: center; color: var(--text-secondary);">Loading APIs...
                        </div>
                    </div>
                </div>
            </div>

            <!-- 2. Available Units (Placeholder until login) -->
            <div id="units-container"
                style="margin-bottom: 2rem; padding: 1rem; background: var(--input-bg, #f3f4f6); border-radius: 8px;">
                <h3 style="margin: 0 0 0.5rem 0; font-size: 1rem; color: #374151;">Available Units</h3>
                <div id="units-list" style="max-height: 100px; overflow-y: auto; color: #1f2937; font-size: 0.9rem;">
                    Waiting for login...
                </div>
            </div>

            <!-- 3. Login Section -->
            <div id="login-container" style="margin-bottom: 2rem;"></div>

            <!-- 4. Test Table Section (Visible but actions may require auth) -->
            <div id="api-test-section" class="hidden">
                <h3 style="color: var(--text-primary); margin-bottom: 1rem;">Selected APIs</h3>

                <div class="table-responsive" style="overflow-x: auto;">
                    <table style="width: 100%; border-collapse: collapse; min-width: 600px;">
                        <thead>
                            <tr
                                style="background: rgba(99, 102, 241, 0.1); color: var(--text-primary); text-align: left;">
                                <th style="padding: 1rem; border-bottom: 2px solid var(--border-color); width: 15%;">API
                                    Name</th>
                                <th style="padding: 1rem; border-bottom: 2px solid var(--border-color); width: 150px;">
                                    Test ID</th>
                                <th style="padding: 1rem; border-bottom: 2px solid var(--border-color); width: 120px;">
                                    Action</th>
                                <th style="padding: 1rem; border-bottom: 2px solid var(--border-color);">Results (Per
                                    Unit)</th>
                            </tr>
                        </thead>
                        <tbody id="selected-apis-body">
                            <!-- Rows injected by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../components/login_component.js"></script>
    <script src="script.js"></script>
</body>

</html>
